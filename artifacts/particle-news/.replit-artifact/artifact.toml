kind = "mobile"
previewPath = "/"
title = "Particle News"
version = "1.0.0"
id = "artifacts/particle-news"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21254

[services.development]
run = "pnpm --filter @workspace/particle-news run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/particle-news", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/particle-news", "run", "serve" ]

[services.env]
PORT = "21254"
BASE_PATH = "/"
